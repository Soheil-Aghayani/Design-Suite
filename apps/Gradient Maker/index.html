<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft Gradient Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Left Photoshop-style narrow dock -->
    <aside class="left-toolbar">
      <div class="logo-icon" title="Gradient Maker">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a7 7 0 0 0-7 7c0 5.25 7 13 7 13s7-7.75 7-13a7 7 0 0 0-7-7z"/>
        </svg>
      </div>
      
      <div class="toolbar-divider"></div>
      
      <!-- Zoom Controls -->
      <div class="toolbar-section">
        <button class="tool-btn" id="zoom-in-btn" data-tooltip="Zoom In">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="11" y1="8" x2="11" y2="14"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
        <span class="zoom-display" id="zoom-display-text">100%</span>
        <button class="tool-btn" id="zoom-out-btn" data-tooltip="Zoom Out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
        <button class="tool-btn" id="zoom-reset-btn" data-tooltip="Reset Zoom & Pan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h6v6"/>
            <path d="M9 21H3v-6"/>
            <path d="M21 3l-7 7"/>
            <path d="M3 21l7-7"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Quick Actions -->
      <div class="toolbar-section">
        <button class="tool-btn" id="btn-reset" data-tooltip="Reset to Defaults">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6"/>
            <path d="M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Quick Export Section -->
      <div class="toolbar-section">
        <button class="tool-btn" id="btn-quick-export" data-tooltip="Export PNG">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Main Canvas Viewport (Flowchart Style) -->
    <main class="canvas-container">
      <div class="canvas-bg"></div>
      
      <div class="canvas-viewport">
        <!-- Interactive Preview Container -->
        <div id="preview-container" class="show-checkerboard">
          <!-- Active Gradient Focus Canvas -->
          <canvas id="gradient-canvas" width="400" height="400"></canvas>
        </div>
      </div>

      <!-- Floating HUD status bar -->
      <div class="hud-status-bar">
        <span class="hud-item" id="hud-gradient-lbl">Active: Gradient #1</span>
        <span class="hud-divider">|</span>
        <span class="hud-item" id="hud-params-lbl">Angle: 135°</span>
        <span class="hud-divider">|</span>
        <span class="hud-item" id="hud-zoom-val">Zoom: 100%</span>
      </div>
    </main>

    <!-- Right Sidebar (Inspector & Configuration Panel) -->
    <aside class="right-sidebar">
      <!-- Tabs (Gallery, Parameters, Export) -->
      <div class="sidebar-tabs">
        <button class="tab-btn active" id="tab-btn-gallery" data-tab="tab-gallery">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          Gallery
        </button>
        <button class="tab-btn" id="tab-btn-editor" data-tab="tab-editor">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Editor
        </button>
        <button class="tab-btn" id="tab-btn-export" data-tab="tab-export">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
          Export
        </button>
      </div>

      <!-- Tab Content: Gallery / Batch Generation -->
      <div class="sidebar-tab-content active" id="tab-gallery">
        <div class="input-group">
          <div class="input-section-title">Batch Settings</div>
          
          <div class="input-field-wrapper">
            <label for="batch-count">Generate Count</label>
            <input type="number" id="batch-count" class="text-input" min="1" max="60" value="12">
          </div>

          <button class="action-btn" id="btn-re-random">Generate Random Batch</button>
        </div>

        <div class="input-group">
          <div class="input-section-title">Generated Gradients</div>
          
          <!-- Interactive thumbnail scroll list -->
          <div class="gallery-grid" id="gallery-grid-list">
            <!-- Dynamic thumbnails will load here -->
          </div>
        </div>
      </div>

      <!-- Tab Content: Editor / Parameters -->
      <div class="sidebar-tab-content" id="tab-editor">
        <div class="input-group">
          <div class="input-section-title">Gradient Colors</div>

          <div class="input-field-wrapper">
            <label>Base Color A</label>
            <div class="color-picker-container">
              <input type="color" id="color-a-picker" value="#4f46e5">
              <input type="text" id="color-a-text" class="text-input" value="#4f46e5" placeholder="#4f46e5">
            </div>
          </div>

          <div class="input-field-wrapper">
            <label>Base Color B</label>
            <div class="color-picker-container">
              <input type="color" id="color-b-picker" value="#06b6d4">
              <input type="text" id="color-b-text" class="text-input" value="#06b6d4" placeholder="#06b6d4">
            </div>
          </div>

          <div class="input-field-wrapper">
            <label>Base Color C (Highlight)</label>
            <div class="color-picker-container">
              <input type="color" id="color-c-picker" value="#ff6b6b">
              <input type="text" id="color-c-text" class="text-input" value="#ff6b6b" placeholder="#ff6b6b">
            </div>
          </div>
        </div>

        <div class="input-group">
          <div class="input-section-title">Gradients Alignment</div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="linear-angle">Linear Gradient Angle</label>
              <span id="linear-angle-lbl">135°</span>
            </div>
            <input type="range" id="linear-angle" min="0" max="360" value="135">
          </div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="hl1-x">Highlight 1 Pos X</label>
              <span id="hl1-x-lbl">50%</span>
            </div>
            <input type="range" id="hl1-x" min="0" max="100" value="50">
          </div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="hl1-y">Highlight 1 Pos Y</label>
              <span id="hl1-y-lbl">50%</span>
            </div>
            <input type="range" id="hl1-y" min="0" max="100" value="50">
          </div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="hl2-x">Highlight 2 Pos X</label>
              <span id="hl2-x-lbl">20%</span>
            </div>
            <input type="range" id="hl2-x" min="0" max="100" value="20">
          </div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="hl2-y">Highlight 2 Pos Y</label>
              <span id="hl2-y-lbl">80%</span>
            </div>
            <input type="range" id="hl2-y" min="0" max="100" value="80">
          </div>
        </div>

        <div class="input-group">
          <div class="input-section-title">Overlays & Effects</div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="grain-opacity">Grain Noise Opacity</label>
              <span id="grain-opacity-lbl">4%</span>
            </div>
            <input type="range" id="grain-opacity" min="0" max="15" value="4">
          </div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="vignette-opacity">Vignette Shadows</label>
              <span id="vignette-opacity-lbl">25%</span>
            </div>
            <input type="range" id="vignette-opacity" min="0" max="60" value="25">
          </div>
        </div>
      </div>

      <!-- Tab Content: Export -->
      <div class="sidebar-tab-content" id="tab-export">
        <div class="input-group">
          <div class="input-section-title">Image Export Settings</div>
          
          <div class="input-field-wrapper">
            <label for="export-size">Export Resolution</label>
            <select id="export-size" class="text-input">
              <option value="1024x1024">Square (1024 × 1024)</option>
              <option value="2048x2048">Ultra Square (2048 × 2048)</option>
              <option value="1920x1080">Landscape Full HD (1920 × 1080)</option>
            </select>
          </div>

          <button class="action-btn" id="btn-export-png">Generate PNG Gradient</button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Toast Notification Overlay -->
  <div class="app-toast" id="app-toast">Copied to Clipboard!</div>

  <script src="app.js"></script>
</body>
</html>
