<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angle Designer Workspace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Left Photoshop-style narrow dock -->
    <aside class="left-toolbar">
      <div class="logo-icon" title="Angle Designer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 12 12 19 5"></polyline>
        </svg>
      </div>
      
      <div class="toolbar-divider"></div>
      
      <!-- Zoom Controls -->
      <div class="toolbar-section">
        <button class="tool-btn" id="zoom-in-btn" data-tooltip="Zoom In">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="11" y1="8" x2="11" y2="14"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
        <span class="zoom-display" id="zoom-display-text">100%</span>
        <button class="tool-btn" id="zoom-out-btn" data-tooltip="Zoom Out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
        <button class="tool-btn" id="zoom-reset-btn" data-tooltip="Reset Zoom & Pan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h6v6"/>
            <path d="M9 21H3v-6"/>
            <path d="M21 3l-7 7"/>
            <path d="M3 21l7-7"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Quick Actions -->
      <div class="toolbar-section">
        <button class="tool-btn" id="btn-reset" data-tooltip="Reset to Defaults">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6"/>
            <path d="M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Quick Export Section -->
      <div class="toolbar-section">
        <button class="tool-btn" id="btn-quick-export" data-tooltip="Export PNG">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Main Canvas Viewport (Flowchart Style) -->
    <main class="canvas-container">
      <!-- Mobile Floating Toggles -->
      <button class="mobile-toggle-btn left-toggle" id="btn-toggle-left" title="Toggle Tools">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <button class="mobile-toggle-btn right-toggle" id="btn-toggle-right" title="Toggle Inspector">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
      <!-- Sidebar Backdrop Overlay -->
      <div class="sidebar-overlay" id="mobile-sidebar-overlay"></div>

      <!-- Floating Navigation Pill -->
      <div class="nav-pill" id="nav-pill">
        <span class="nav-pill-label">Angle Drawer</span>
        <button class="nav-pill-btn back-hub" id="btn-nav-hub" title="Back to Hub" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Hub
        </button>
        <button class="nav-pill-btn open-standalone" id="btn-nav-standalone" title="Open in standalone tab" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Standalone
        </button>
      </div>

      <div class="canvas-bg"></div>
      
      <div class="canvas-viewport">
        <!-- Interactive Preview Container -->
        <div id="preview-container" class="show-checkerboard">
          <!-- The live Angle vector will be drawn inside this canvas -->
          <canvas id="angle-canvas" width="720" height="420"></canvas>
        </div>
      </div>

      <!-- Floating HUD status bar -->
      <div class="hud-status-bar">
        <span class="hud-item" id="hud-deg-val">Angle: 135.0°</span>
        <span class="hud-divider">|</span>
        <span class="hud-item" id="hud-style-val">Style: Standard</span>
        <span class="hud-divider">|</span>
        <span class="hud-item" id="hud-zoom-val">Zoom: 100%</span>
      </div>
    </main>

    <!-- Right Sidebar (Inspector & Configuration Panel) -->
    <aside class="right-sidebar">
      <!-- Tabs (Angle, Style, Export) -->
      <div class="sidebar-tabs">
        <button class="tab-btn active" id="tab-btn-angle" data-tab="tab-angle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 12 12 19 5"></polyline>
          </svg>
          Angle
        </button>
        <button class="tab-btn" id="tab-btn-style" data-tab="tab-style">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
            <path d="M12 6v6l4 2"/>
          </svg>
          Style
        </button>
        <button class="tab-btn" id="tab-btn-export" data-tab="tab-export">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
          Export
        </button>
      </div>

      <!-- Tab Content: Angle -->
      <div class="sidebar-tab-content active" id="tab-angle">
        <div class="input-group">
          <div class="input-section-title">Value Settings</div>
          
          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="angle-degrees">Angle (Degrees)</label>
              <span id="angle-degrees-lbl">135.0°</span>
            </div>
            <input type="range" id="angle-degrees" min="-360" max="360" step="0.5" value="135.0">
          </div>

          <div class="input-field-wrapper">
            <label for="angle-text">Precise Input</label>
            <input type="number" id="angle-text" class="text-input" step="0.1" value="135.0">
          </div>
        </div>

        <div class="input-group">
          <div class="input-section-title">Quick Angle Snaps</div>
          <div class="snap-grid">
            <button class="action-btn secondary snap-btn" data-val="0">0°</button>
            <button class="action-btn secondary snap-btn" data-val="30">30°</button>
            <button class="action-btn secondary snap-btn" data-val="45">45°</button>
            <button class="action-btn secondary snap-btn" data-val="60">60°</button>
            <button class="action-btn secondary snap-btn" data-val="90">90°</button>
            <button class="action-btn secondary snap-btn" data-val="120">120°</button>
            <button class="action-btn secondary snap-btn" data-val="135">135°</button>
            <button class="action-btn secondary snap-btn" data-val="180">180°</button>
          </div>
        </div>
      </div>

      <!-- Tab Content: Style -->
      <div class="sidebar-tab-content" id="tab-style">
        <div class="input-group">
          <div class="input-section-title">Line Styling</div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="stroke-width">Stroke Width</label>
              <span id="stroke-width-lbl">12px</span>
            </div>
            <input type="range" id="stroke-width" min="2" max="36" value="12">
          </div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="arc-thickness">Arc Thickness</label>
              <span id="arc-thickness-lbl">9px</span>
            </div>
            <input type="range" id="arc-thickness" min="1" max="28" value="9">
          </div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="arc-radius">Arc Radius Ratio</label>
              <span id="arc-radius-lbl">22%</span>
            </div>
            <input type="range" id="arc-radius" min="5" max="45" value="22">
          </div>
        </div>

        <div class="input-group">
          <div class="input-section-title">Toggles & Palette</div>

          <div class="checkbox-row">
            <label class="switch-container">
              <input type="checkbox" id="hand-drawn">
              <span class="switch-slider"></span>
            </label>
            <span class="checkbox-label">Hand-drawn sketchy vibe</span>
          </div>

          <div class="checkbox-row">
            <label class="switch-container">
              <input type="checkbox" id="show-label">
              <span class="switch-slider"></span>
            </label>
            <span class="checkbox-label">Show angle degree label</span>
          </div>

          <div class="checkbox-row">
            <label class="switch-container">
              <input type="checkbox" id="show-checkerboard" checked>
              <span class="switch-slider"></span>
            </label>
            <span class="checkbox-label">Preview checkerboard layer</span>
          </div>

          <div class="input-field-wrapper">
            <label>Stroke Color</label>
            <div class="color-picker-container">
              <input type="color" id="stroke-color-picker" value="#0f0f10">
              <input type="text" id="stroke-color-text" class="text-input" value="#0f0f10" placeholder="#0f0f10">
            </div>
          </div>
        </div>
      </div>

      <!-- Tab Content: Export -->
      <div class="sidebar-tab-content" id="tab-export">
        <div class="input-group">
          <div class="input-section-title">Image Export Settings</div>
          
          <div class="input-field-wrapper">
            <label for="export-size">Export Resolution</label>
            <select id="export-size" class="text-input">
              <option value="1600x900">Landscape Wide (1600 × 900)</option>
              <option value="1920x1080">Full HD (1920 × 1080)</option>
              <option value="1024x1024">Square (1024 × 1024)</option>
              <option value="2048x2048">Ultra Square (2048 × 2048)</option>
            </select>
          </div>

          <button class="action-btn" id="btn-export-png">Generate Transparent PNG</button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Toast Notification Overlay -->
  <div class="app-toast" id="app-toast">Copied to Clipboard!</div>

  <script src="app.js"></script>
</body>
</html>
