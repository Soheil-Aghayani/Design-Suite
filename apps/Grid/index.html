<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid & Aspect Ratio Calculator Workspace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Left Photoshop-style narrow dock -->
    <aside class="left-toolbar">
      <div class="logo-icon" title="Grid Calculator">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
          <line x1="15" y1="3" x2="15" y2="21"/>
          <line x1="3" y1="9" x2="21" y2="9"/>
          <line x1="3" y1="15" x2="21" y2="15"/>
        </svg>
      </div>
      
      <div class="toolbar-divider"></div>
      
      <!-- Quick grid code copies -->
      <div class="toolbar-section">
        <button class="tool-btn" id="btn-quick-css-grid" data-tooltip="Copy CSS Grid Code">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Main Workspace Viewport -->
    <main class="canvas-container">
      <div class="canvas-bg"></div>

      <!-- Tab Viewports -->
      <div class="workspace-viewport">
        <!-- 1. COLUMN GRID LAYOUT -->
        <div class="workspace-panel active" id="view-grid">
          <div class="grid-preview-container">
            <div class="grid-header-row">
              <span class="grid-stat-lbl" id="grid-stats-text">Columns: 12 | Gutter: 20px | Margin: 24px</span>
            </div>
            
            <!-- Live CSS Grid Overlay container -->
            <div class="columns-overlay" id="grid-columns-overlay">
              <!-- Dynamically populated column items -->
            </div>
          </div>
        </div>

        <!-- 2. ASPECT RATIO CARD -->
        <div class="workspace-panel" id="view-aspect">
          <div class="ratio-display-card">
            <div class="ratio-card-header">
              <span id="ratio-active-lbl">Aspect Ratio: 16:9</span>
            </div>
            
            <div class="ratio-visualizer-container">
              <!-- Ratio Scaled Card -->
              <div class="ratio-scaled-box" id="ratio-box">
                <span class="ratio-box-dimensions" id="ratio-box-dimensions-lbl">1200 × 675</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 3. SPACING GUIDES TABLE -->
        <div class="workspace-panel" id="view-spacing">
          <div class="spacing-table-card">
            <div class="spacing-header-row">
              <span>Spacing Scale Builder</span>
            </div>
            <div class="spacing-table-container">
              <table class="spacing-table" id="spacing-guides-table">
                <thead>
                  <tr>
                    <th>Scale Name</th>
                    <th>Multiplier Value (px)</th>
                    <th>CSS Equivalent</th>
                    <th>Tailwind Class</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Populated dynamically based on spacing multiplier -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Right Sidebar (Inspector & Configuration Panel) -->
    <aside class="right-sidebar">
      <!-- Tabs (Grid, Aspect, Spacing) -->
      <div class="sidebar-tabs">
        <button class="tab-btn active" id="tab-btn-grid" data-tab="view-grid">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <line x1="9" y1="3" x2="9" y2="21"/>
            <line x1="15" y1="3" x2="15" y2="21"/>
          </svg>
          Grid
        </button>
        <button class="tab-btn" id="tab-btn-aspect" data-tab="view-aspect">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          Aspect Ratio
        </button>
        <button class="tab-btn" id="tab-btn-spacing" data-tab="view-spacing">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12">
            <line x1="4" y1="9" x2="20" y2="9"/>
            <line x1="4" y1="15" x2="20" y2="15"/>
            <line x1="10" y1="3" x2="10" y2="21"/>
          </svg>
          Spacing
        </button>
      </div>

      <!-- Tab Content: Grid settings -->
      <div class="sidebar-tab-content active" id="panel-grid-settings">
        <div class="input-group">
          <div class="input-section-title">Layout Parameters</div>
          
          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="grid-cols-count">Grid Columns</label>
              <span id="grid-cols-count-lbl">12</span>
            </div>
            <input type="range" id="grid-cols-count" min="1" max="24" value="12">
          </div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="grid-gutter">Gutter Width (px)</label>
              <span id="grid-gutter-lbl">20px</span>
            </div>
            <input type="range" id="grid-gutter" min="0" max="60" value="20">
          </div>

          <div class="input-field-wrapper">
            <div class="range-labels">
              <label for="grid-margin">Outer Margin (px)</label>
              <span id="grid-margin-lbl">24px</span>
            </div>
            <input type="range" id="grid-margin" min="0" max="100" value="24">
          </div>

          <div class="input-field-wrapper">
            <label for="grid-container-width">Max Container Width (px)</label>
            <input type="number" id="grid-container-width" class="text-input" min="300" max="5000" value="1140">
          </div>
        </div>

        <button class="action-btn" id="btn-copy-css-grid" style="margin-top: 10px;">Copy CSS Grid Code</button>
      </div>

      <!-- Tab Content: Aspect Settings -->
      <div class="sidebar-tab-content" id="panel-aspect-settings">
        <div class="input-group">
          <div class="input-section-title">Aspect Presets</div>
          
          <div class="input-field-wrapper">
            <label for="aspect-preset">Preset Ratio</label>
            <select id="aspect-preset" class="text-input">
              <option value="16:9">Widescreen Video (16:9)</option>
              <option value="4:3">Classic TV (4:3)</option>
              <option value="1:1">Instagram Square (1:1)</option>
              <option value="1.618:1">Golden Ratio (1.618:1)</option>
              <option value="21:9">Ultra Widescreen (21:9)</option>
              <option value="9:16">Mobile Story (9:16)</option>
              <option value="custom">Custom Ratio</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <div class="input-section-title">Dimensions Calculator</div>

          <div class="input-field-wrapper">
            <label for="ratio-w">Width (px)</label>
            <input type="number" id="ratio-w" class="text-input" value="1920">
          </div>

          <div class="input-field-wrapper">
            <label for="ratio-h">Height (px)</label>
            <input type="number" id="ratio-h" class="text-input" value="1080">
          </div>
        </div>
      </div>

      <!-- Tab Content: Spacing Settings -->
      <div class="sidebar-tab-content" id="panel-spacing-settings">
        <div class="input-group">
          <div class="input-section-title">Spacing Scale Options</div>
          
          <div class="input-field-wrapper">
            <label for="spacing-base">Base Multiplier (px)</label>
            <input type="number" id="spacing-base" class="text-input" min="2" max="32" value="8">
          </div>
        </div>

        <div class="input-group">
          <button class="action-btn" id="btn-copy-tailwind" style="margin-top: 10px;">Copy Tailwind Config</button>
        </div>
      </div>
    </aside>
  </div>

  <!-- Toast Notification Overlay -->
  <div class="app-toast" id="app-toast">Copied to Clipboard!</div>

  <script src="app.js"></script>
</body>
</html>
