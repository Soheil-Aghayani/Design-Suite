<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/tool.css">
</head>
<body>

<div class="controls">
    <div class="control-group">
        <label>Color A</label>
        <div class="row">
            <input type="color" id="a" value="#ff9500">
            <input type="text" id="a-hex" value="#FF9500" style="width: 100px; text-transform: uppercase; font-family: monospace;">
        </div>
    </div>
    <div class="control-group">
        <label>Color B</label>
        <div class="row">
            <input type="color" id="b" value="#ff2d55">
            <input type="text" id="b-hex" value="#FF2D55" style="width: 100px; text-transform: uppercase; font-family: monospace;">
        </div>
    </div>
    <div class="control-group">
        <label>Overlay C</label>
        <div class="row">
            <input type="color" id="c" value="#5856d6">
            <input type="text" id="c-hex" value="#5856D6" style="width: 100px; text-transform: uppercase; font-family: monospace;">
        </div>
    </div>
    <div class="control-group">
        <label for="angle">Angle (°)</label>
        <input type="range" id="angle" min="0" max="360" value="135">
    </div>
    <div class="control-group">
        <label for="noise">Noise Level</label>
        <input type="range" id="noise" min="0" max="50" value="15">
    </div>
    <div class="control-group">
        <label for="seed">Seed Number</label>
        <input type="number" id="seed" value="12345">
    </div>
    <div class="control-group">
        <label>&nbsp;</label>
        <button class="secondary" onclick="randomize()">Randomize All</button>
    </div>
    <div class="control-group">
        <label>&nbsp;</label>
        <button onclick="download()">Download PNG</button>
    </div>
</div>

<canvas id="canvas" width="1000" height="1000" style="width: 500px; height: 500px;"></canvas>

<script>
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const el = id => document.getElementById(id);
    const ui = ['a','a-hex','b','b-hex','c','c-hex','angle','noise','seed'].reduce((a,c)=>({...a,[c]:el(c)}), {});
    
    // Mulberry32 PRNG
    function rand(s) {
        return function() {
            let t = s += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    // Hex Sync
    ['a','b','c'].forEach(p => {
        ui[p].oninput = () => { ui[p+'-hex'].value = ui[p].value.toUpperCase(); draw(); save(); };
        ui[p+'-hex'].oninput = () => { if(/^#[0-9A-F]{6}$/i.test(ui[p+'-hex'].value)) { ui[p].value = ui[p+'-hex'].value; draw(); save(); } };
    });

    function randomize() {
        const rc = () => `#${Math.floor(Math.random()*16777215).toString(16).padStart(6,'0')}`;
        ui.a.value = rc(); ui.b.value = rc(); ui.c.value = rc();
        ui['a-hex'].value = ui.a.value.toUpperCase();
        ui['b-hex'].value = ui.b.value.toUpperCase();
        ui['c-hex'].value = ui.c.value.toUpperCase();
        ui.angle.value = Math.floor(Math.random()*360);
        ui.seed.value = Math.floor(Math.random()*999999);
        draw(); save();
    }

    function draw() {
        const w = 1000, h = 1000, ang = (ui.angle.value*Math.PI)/180;
        const x1 = w/2-Math.cos(ang)*w/2, y1 = h/2-Math.sin(ang)*h/2, x2 = w/2+Math.cos(ang)*w/2, y2 = h/2+Math.sin(ang)*h/2;
        
        // Linear Base
        const lg = ctx.createLinearGradient(x1,y1,x2,y2);
        lg.addColorStop(0, ui.a.value); lg.addColorStop(1, ui.b.value);
        ctx.fillStyle = lg; ctx.fillRect(0,0,w,h);
        
        // Radial Overlay
        const rg = ctx.createRadialGradient(w*0.8, h*0.2, 0, w*0.8, h*0.2, w*0.8);
        const hex = ui.c.value;
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        rg.addColorStop(0, `rgba(${r},${g},${b},0.6)`);
        rg.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = rg; ctx.fillRect(0,0,w,h);

        // Seeded Noise
        const n = parseInt(ui.noise.value);
        if(n > 0) {
            const getNext = rand(parseInt(ui.seed.value)||0);
            const id = ctx.getImageData(0,0,w,h), d = id.data;
            for(let i=0; i<d.length; i+=4) {
                const ns = (getNext() - 0.5) * n * 2;
                d[i] += ns; d[i+1] += ns; d[i+2] += ns;
            }
            ctx.putImageData(id,0,0);
        }
    }

    function save() {
        const data = Object.keys(ui).reduce((a,c)=>({...a,[c]:ui[c].type==='checkbox'?ui[c].checked:ui[c].value}), {});
        localStorage.setItem('suite_tool_gradient', JSON.stringify(data));
    }

    function load() {
        const raw = localStorage.getItem('suite_tool_gradient');
        if (raw) {
            const d = JSON.parse(raw);
            Object.keys(d).forEach(k => { if(ui[k]) ui[k].value = d[k]; });
        }
        draw();
    }

    function download() { const l = document.createElement('a'); l.download = `gradient-${Date.now()}.png`; l.href = canvas.toDataURL(); l.click(); }

    Object.values(ui).forEach(el => { if(el.oninput) return; el.oninput = () => { draw(); save(); } });
    window.onload = load;
</script>
</body>
</html>
